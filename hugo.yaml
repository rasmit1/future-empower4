
baseURL: "https://www.futureempowered.com/"
languageCode: "en-us"
title: "Future Empowered"
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
pygmentsUseClasses: true

minify:
  disableXML: true

relativeURLs: false

pagination:
  pagerSize: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

# Main navigation
menu:
  main:
    - name: "Home"
      url: "/"
      weight: 5

    - name: "About"
      url: "/about/"
      weight: 10

    - name: "Services"
      url: "/services/"
      weight: 20

    - name: "Insights"
      url: "/insights/"
      weight: 30

    - name: "Resources"
      url: "/resources/"
      identifier: "resources"
      weight: 40

    - name: "Guides"
      url: "/guides/"
      parent: "resources"
      weight: 41

    - name: "Tools"
      url: "/tools/"
      parent: "resources"
      weight: 42

# Site parameters
params:
  env: "production"
  title: "Future Empowered"
  description: "Future Empowered helps organizations design and build the systems of tomorrow — integrating strategy, technology, AI, operations, and control into a unified transformation engine that empowers people and accelerates performance."
  author: "Rashmi Mittal"
  email: "futureempoweredenabler@gmail.com"

  defaultTheme: "light"
  disableThemeToggle: false

  label:
    iconSVG: "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 48 48\" role=\"img\" aria-hidden=\"true\"><rect width=\"48\" height=\"48\" rx=\"12\" fill=\"#1a5c3a\"/><text x=\"50%\" y=\"55%\" font-family=\"Inter, sans-serif\" font-size=\"20\" font-weight=\"700\" text-anchor=\"middle\" fill=\"#ffffff\">FE</text></svg>"
    icon: "/images/logo-mark.svg"
    iconHeight: 40

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowToc: true
  TocOpen: true
  disableSpecial1stPost: true

  buttons:
    - name: Archive
      url: "/archive"

  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  # Brand tagline — used in nav subtitle and footer
  brandTagline: "Enabled today. Empowered for tomorrow."

  # Home page hero
  assets:
    disableHLJS: false
    favicon: "/images/favicon.svg"
    favicon16x16: "/images/favicon.svg"
    favicon32x32: "/images/favicon.svg"
    apple_touch_icon: "/images/favicon.svg"
  enableSiteSearch: true

  socialIcons:
    - name: "linkedin"
      url: "https://www.linkedin.com/in/mittalrashmi"
    - name: email
      url: "mailto:futureempoweredenabler@gmail.com"

  showSocialIcons: true
  footer:
    socialIcons: false
  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content

taxonomies:
  category: "categories"
  tag: "tags"
  series: "series"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

mainSections:
  - blog
  - docs